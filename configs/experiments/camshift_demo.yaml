# EOVOT CamShift baseline demo
# -----------------------------
# Compares the new CamShift colour-histogram tracker against KCF on
# procedurally-generated sequences — no external dataset download needed.
#
# Run with:
#   python scripts/run_experiment.py \
#     --config configs/experiments/camshift_demo.yaml
#
# CamShift tracks via the target's hue distribution rather than a learned
# correlation filter, so it is sensitive to the target/background colour
# contrast (see eovot/trackers/camshift.py docstring). It is one of the
# cheapest trackers in EOVOT in terms of per-frame compute (no FFTs, no
# online learning step), making it a useful floor-accuracy / ceiling-FPS
# reference point on constrained edge hardware.

experiment:
  name: "camshift-vs-kcf-synthetic"
  seed: 42
  tdp_watts: null

dataset:
  loader: SyntheticDataset
  name: Synthetic-Linear
  motion: linear
  num_sequences: 10
  num_frames: 100
  frame_size: [320, 240]
  bbox_size: [40, 40]
  seed: 42

trackers:
  - name: KCF
    params:
      learning_rate: 0.075
      padding: 1.5

  - name: CamShift
    params:
      hist_bins: 16
