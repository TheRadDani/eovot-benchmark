# EOVOT Kalman Filter tracker demo experiment
#
# Runs the KalmanFilterTracker on the synthetic dataset — no external data
# required. Demonstrates the Kalman-prediction + NCC-measurement pipeline
# and compares it with MOSSE and KCF on identical sequences.
#
# Run with:
#   python scripts/run_experiment.py --config configs/experiments/kalman_demo.yaml
#
# To benchmark on OTB-100, change the dataset section to:
#   loader: OTBDataset
#   root: /path/to/OTB100
#   name: OTB100

experiment:
  name: "kalman-filter-demo"
  seed: 42
  tdp_watts: null  # set to your device TDP (e.g. 6.0 for RPi 4) for energy estimates

dataset:
  loader: SyntheticDataset
  num_sequences: 10
  num_frames: 100
  frame_size: [320, 240]
  bbox_size: [40, 40]
  motion: linear         # linear | circular | random
  seed: 42

trackers:
  - name: MOSSE
    params:
      learning_rate: 0.125

  - name: KCF
    params:
      learning_rate: 0.075

  - name: KalmanFilter
    params:
      process_noise: 1.0       # higher → trust motion model less
      measurement_noise: 10.0  # higher → rely more on prediction
      search_factor: 2.5       # search window = 2.5× target size on each side
      ncc_threshold: 0.3       # minimum NCC score to accept a measurement
      learning_rate: 0.05      # EMA weight for online template update
