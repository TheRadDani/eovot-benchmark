# EOVOT adaptive tracker demo — compare plain KCF against adaptive variants
#
# Run with:
#   python scripts/run_experiment.py \
#       --config configs/experiments/adaptive_tracker_demo.yaml
#
# This experiment benchmarks the accuracy-latency trade-off introduced by
# adaptive frame-skipping.  Three configurations are compared:
#
#   1. KCF (baseline)           — full update every frame
#   2. Adaptive-KCF (moderate)  — skip when confidence >= 0.80, max 3 consecutive
#   3. Adaptive-KCF (aggressive)— skip when confidence >= 0.65, max 5 consecutive
#
# Expected result: aggressive skipping improves FPS while trading a few IoU
# points; moderate skipping finds a better balance.  The ideal operating
# point is dataset- and device-dependent.

experiment:
  name: "adaptive-tracker-comparison"
  seed: 42
  # Set to your device's CPU TDP (Watts) to enable energy estimation.
  # Examples: 6.0 (Raspberry Pi 4), 10.0 (Jetson Nano), 15.0 (laptop)
  tdp_watts: null

dataset:
  loader: SyntheticDataset   # No real data needed for this demo
  num_sequences: 10
  num_frames: 150
  frame_size: [320, 240]
  bbox_size: [40, 40]
  motion: "linear"
  seed: 42
  name: "SyntheticLinear"
  max_sequences: null

trackers:
  - name: KCF
    params:
      learning_rate: 0.075

  - name: Adaptive
    params:
      inner: KCF
      confidence_threshold: 0.80
      max_consecutive_skips: 3
      window_size: 8

  - name: Adaptive
    params:
      inner: KCF
      confidence_threshold: 0.65
      max_consecutive_skips: 5
      window_size: 8
