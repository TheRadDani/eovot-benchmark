# DCF vs Classical Trackers Comparison
# Compares DCF (HOG-based) against MOSSE and KCF (pixel-based) on a
# synthetic benchmark to quantify the accuracy gain from richer features.
#
# Usage:
#   python scripts/run_experiment.py \
#     --config configs/experiments/dcf_classical_comparison.yaml \
#     --output-dir results/dcf_comparison

dataset:
  loader: SyntheticDataset
  num_sequences: 10
  num_frames: 100
  frame_size: [320, 240]
  bbox_size: [40, 30]
  motion: linear   # deterministic: easy to reproduce across runs
  seed: 42

trackers:
  - name: MOSSE
    params: {}

  - name: KCF
    params:
      learning_rate: 0.075

  - name: DCF
    params:
      learning_rate: 0.075
      padding: 1.5
      num_hog_bins: 9
      cell_size: 4

output:
  save_json: true
  save_csv: true

# Optional: uncomment to profile energy consumption
# energy:
#   tdp_watts: 6.0    # e.g. Raspberry Pi 4 TDP
