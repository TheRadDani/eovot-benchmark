# EOVOT Frame-Drop Efficiency Experiment
#
# Compares bare classical trackers against their FrameDropTracker-wrapped
# counterparts on the built-in SyntheticDataset.  No external dataset needed.
#
# Run with:
#   python scripts/run_experiment.py --config configs/experiments/frame_drop_demo.yaml
#
# The leaderboard will show FPS and EES for both bare and wrapped trackers.
# Wrapped trackers (_fd suffix) should show higher FPS on low-motion sequences
# at minimal accuracy cost.

experiment:
  name: "frame-drop-efficiency"
  seed: 42
  tdp_watts: null          # set to your device TDP (e.g. 6.0 for RPi 4) for energy estimates

dataset:
  loader: SyntheticDataset
  num_sequences: 10
  num_frames: 150
  frame_size: [320, 240]
  bbox_size: [40, 40]
  motion: linear           # "linear" | "circular" | "random"
  seed: 42
  name: Synthetic-Linear

trackers:
  # Bare baselines
  - name: MOSSE
    params:
      learning_rate: 0.125
      sigma: 2.0

  - name: KCF
    params:
      learning_rate: 0.125

  # FrameDrop-wrapped variants
  # Use FrameDropTracker directly in Python — see Usage below:
  #
  #   from eovot.trackers.mosse import MOSSETracker
  #   from eovot.trackers.frame_drop import FrameDropTracker
  #
  #   tracker = FrameDropTracker(
  #       MOSSETracker(),
  #       stability_threshold=0.85,
  #       max_consecutive_skips=3,
  #   )
  #   engine.run(tracker, dataset, "Synthetic-Linear")
