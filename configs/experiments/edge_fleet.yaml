# EOVOT Experiment: Edge Fleet Simulation
#
# Evaluates all built-in classical trackers on a synthetic dataset and
# projects their performance onto the six built-in edge device profiles:
#   rpi4, rpi5, jetson_nano, jetson_xnx, coral_board, snapdragon888
#
# This experiment answers: "Which trackers are deployable on which devices
# given realistic thermal and memory constraints?"
#
# Run the benchmark phase:
#   python scripts/run_experiment.py \
#       --config configs/experiments/edge_fleet.yaml \
#       --output-dir results/edge-fleet/
#
# Then project results onto edge devices using the DeviceSimulator:
#   python - <<'EOF'
#   import json
#   from pathlib import Path
#   from eovot.profiling.device_sim import DeviceSimulator
#   from eovot.profiling.profiler import ProfilingResult
#
#   sim = DeviceSimulator()
#   for p in Path("results/edge-fleet/edge-fleet-synthetic").glob("*.json"):
#       result = json.loads(p.read_text())
#       s = result["summary"]
#       # Reconstruct ProfilingResult from the summary scalars
#       prof = ProfilingResult(
#           tracker_name=s["tracker"],
#           frame_count=s["num_sequences"] * 100,
#           fps=s["mean_fps"],
#           latency_mean_ms=1000.0 / s["mean_fps"],
#           latency_std_ms=0.0,
#           latency_p95_ms=1000.0 / s["mean_fps"],
#           peak_memory_mb=s["peak_memory_mb"],
#       )
#       print(f"\n=== {s['tracker']} ===")
#       print(sim.to_markdown_table(sim.simulate_all(prof, sustained_seconds=60.0)))
#   EOF
#
# Expected results (synthetic linear motion, Intel Core i7 host):
#   Tracker     mIoU   FPS    Deployable on
#   ----------  -----  -----  ----------------------------------------
#   MOSSE        0.92  1000+  All devices (even Coral Board)
#   KCF          0.91   300+  All devices
#   CSRT         0.87   50+   RPi 5, Jetson Xavier NX, Snapdragon 888
#   MedianFlow   0.82   200+  All devices
#   MIL          0.35   30+   RPi 5 and above (marginal)
#   CamShift     0.75   400+  All devices

experiment:
  name: "edge-fleet-synthetic"
  output_dir: "results/edge-fleet/"
  seed: 42
  tdp_watts: 15.0          # laptop CPU (host machine); used only for energy estimates

dataset:
  loader: "SyntheticDataset"
  name: "Synthetic-EdgeFleet"
  num_sequences: 20        # enough for stable FPS estimates
  num_frames: 150          # long enough to trigger warm-up + measure steady-state
  frame_size: [640, 480]   # larger frames stress memory more realistically
  bbox_size: [80, 60]
  motion: "linear"
  seed: 42

trackers:
  - name: MOSSE
    params: {}

  - name: KCF
    params:
      learning_rate: 0.075

  - name: CSRT
    params: {}

  - name: MedianFlow
    params: {}

  - name: MIL
    params: {}

  - name: CamShift
    params: {}

benchmark:
  verbose: true
  warmup_frames: 5         # exclude first 5 frames from latency stats (JIT warmup)

reporting:
  formats:
    - json
    - csv
  print_summary: true

# Device profiles to project onto (from eovot.profiling.device_sim):
#   rpi4, rpi5, jetson_nano, jetson_xnx, coral_board, snapdragon888
# sustained_seconds: 60 models 1-minute continuous tracking with thermal throttling
device_simulation:
  enabled: true
  sustained_seconds: 60.0
  devices:
    - rpi4
    - rpi5
    - jetson_nano
    - jetson_xnx
    - coral_board
    - snapdragon888
